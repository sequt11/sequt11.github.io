<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Right Saver</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0d14;
    --bg-elev:#11151f;
    --surface:rgba(255,255,255,0.04);
    --surface-hover:rgba(255,255,255,0.07);
    --border:rgba(255,255,255,0.08);
    --border-strong:rgba(255,255,255,0.14);
    --text:#e8eaed;
    --text-muted:#8b95a3;
    --text-faint:#5a6373;
    --accent:#7c5cff;
    --accent-2:#22d3ee;
    --accent-soft:rgba(124,92,255,0.15);
    --you-grad:linear-gradient(135deg,#7c5cff 0%,#5b8def 100%);
    --shadow-lg:0 20px 60px -10px rgba(0,0,0,0.6);
    --shadow-md:0 8px 24px -8px rgba(0,0,0,0.5);
    --r-sm:10px;
    --r-md:14px;
    --r-lg:20px;
    --r-xl:28px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:'Inter','Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg);
    color:var(--text);
    overflow:hidden;
    font-size:15px;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  /* Декоративный фоновый градиент */
  body::before{
    content:'';
    position:fixed;inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 0%,rgba(124,92,255,0.18),transparent 60%),
      radial-gradient(ellipse 60% 40% at 90% 100%,rgba(34,211,238,0.10),transparent 60%);
    pointer-events:none;
    z-index:0;
  }
  .app{position:relative;height:100%;display:flex;z-index:1}

  /* ===== Список чатов ===== */
  .chats-page{
    width:100%;display:flex;flex-direction:column;height:100%;
  }
  .header{
    padding:22px 24px 18px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    background:linear-gradient(180deg,rgba(10,13,20,0.85) 0%,rgba(10,13,20,0.6) 100%);
    border-bottom:1px solid var(--border);
    flex-shrink:0;
    position:relative;
    z-index:5;
  }
  .brand{display:flex;align-items:center;gap:12px}
  .brand-logo{
    width:38px;height:38px;border-radius:11px;
    background:var(--you-grad);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px -6px rgba(124,92,255,0.5);
    font-size:18px;
  }
  .brand h1{
    font-size:19px;font-weight:700;letter-spacing:-0.02em;
    background:linear-gradient(135deg,#fff,#b8b8d0);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .brand .sub{font-size:11px;color:var(--text-faint);font-weight:500;margin-top:2px;letter-spacing:0.02em}

  .icon-btn{
    width:40px;height:40px;border-radius:12px;border:1px solid var(--border);
    background:var(--surface);color:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all 0.2s ease;
  }
  .icon-btn:hover{background:var(--surface-hover);border-color:var(--border-strong);transform:translateY(-1px)}
  .icon-btn:active{transform:translateY(0)}
  .icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* Поиск */
  .search-wrap{
    padding:14px 20px 8px;
    flex-shrink:0;
  }
  .search-box{
    position:relative;
    display:flex;align-items:center;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:14px;
    padding:0 14px;
    transition:all 0.2s ease;
  }
  .search-box:focus-within{
    border-color:var(--accent);
    background:rgba(124,92,255,0.06);
    box-shadow:0 0 0 4px rgba(124,92,255,0.08);
  }
  .search-box svg{width:18px;height:18px;color:var(--text-faint);flex-shrink:0;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .search-box input{
    flex:1;background:none;border:none;outline:none;
    color:var(--text);font-family:inherit;font-size:14px;
    padding:11px 10px;
  }
  .search-box input::placeholder{color:var(--text-faint)}

  .file-input{display:none}

  .chats-list{
    flex:1;overflow-y:auto;padding:4px 12px 100px;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .chats-list::-webkit-scrollbar{width:6px}
  .chats-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}
  .chats-list::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}

  .chat-item{
    display:flex;align-items:center;gap:13px;
    padding:11px 12px;margin:2px 0;
    border-radius:14px;cursor:pointer;
    transition:all 0.18s ease;
    position:relative;
  }
  .chat-item:hover{background:var(--surface-hover)}
  .chat-item:active{transform:scale(0.985)}

  .avatar{
    width:48px;height:48px;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-weight:600;font-size:18px;color:#fff;
    flex-shrink:0;letter-spacing:-0.02em;
    box-shadow:var(--shadow-md);
    position:relative;
    overflow:hidden;
  }
  .avatar::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(135deg,rgba(255,255,255,0.18),transparent 50%);
  }

  .chat-info{flex:1;min-width:0}
  .chat-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:3px}
  .chat-name{font-weight:600;font-size:15px;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-count{
    font-size:11px;font-weight:600;color:var(--text-faint);
    background:var(--surface);padding:2px 8px;border-radius:8px;
    flex-shrink:0;border:1px solid var(--border);
  }
  .chat-preview{
    font-size:13.5px;color:var(--text-muted);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    display:flex;align-items:center;gap:6px;
  }
  .chat-preview-tag{
    display:inline-flex;align-items:center;
    color:var(--accent-2);font-weight:500;font-size:12px;
  }

  /* Empty state */
  .empty-state{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:75%;text-align:center;padding:24px;
  }
  .empty-icon{
    width:96px;height:96px;border-radius:28px;
    background:linear-gradient(135deg,rgba(124,92,255,0.15),rgba(34,211,238,0.08));
    border:1px solid var(--border-strong);
    display:flex;align-items:center;justify-content:center;
    margin-bottom:22px;
    position:relative;
  }
  .empty-icon svg{width:44px;height:44px;color:var(--accent);stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .empty-icon::before{
    content:'';position:absolute;inset:-1px;border-radius:inherit;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));
    z-index:-1;opacity:0.3;filter:blur(20px);
  }
  .empty-state h3{font-size:20px;font-weight:700;letter-spacing:-0.02em;margin-bottom:8px}
  .empty-state p{color:var(--text-muted);font-size:14px;max-width:280px;line-height:1.5;margin-bottom:24px}

  .primary-btn{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--you-grad);
    color:#fff;border:none;
    padding:13px 24px;border-radius:14px;
    font-family:inherit;font-size:14.5px;font-weight:600;
    cursor:pointer;transition:all 0.2s ease;
    box-shadow:0 10px 30px -8px rgba(124,92,255,0.5);
    letter-spacing:-0.01em;
  }
  .primary-btn:hover{transform:translateY(-2px);box-shadow:0 14px 36px -8px rgba(124,92,255,0.65)}
  .primary-btn:active{transform:translateY(0)}
  .primary-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  /* FAB для импорта */
  .fab{
    position:absolute;bottom:24px;right:24px;
    width:58px;height:58px;border-radius:50%;
    background:var(--you-grad);color:#fff;border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:all 0.22s ease;
    box-shadow:0 14px 36px -10px rgba(124,92,255,0.6),0 4px 12px -2px rgba(0,0,0,0.4);
    z-index:10;
  }
  .fab:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 20px 44px -10px rgba(124,92,255,0.75)}
  .fab:active{transform:translateY(0) scale(0.98)}
  .fab svg{width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2.4;stroke-linecap:round;stroke-linejoin:round}

  /* ===== Страница чата ===== */
  .chat-page{
    width:100%;display:none;flex-direction:column;height:100%;
    animation:slideIn 0.28s cubic-bezier(0.22,1,0.36,1);
  }
  @keyframes slideIn{
    from{opacity:0;transform:translateX(20px)}
    to{opacity:1;transform:translateX(0)}
  }

  .chat-header{
    padding:14px 18px;
    display:flex;align-items:center;gap:12px;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    background:linear-gradient(180deg,rgba(10,13,20,0.9) 0%,rgba(10,13,20,0.65) 100%);
    border-bottom:1px solid var(--border);
    flex-shrink:0;z-index:5;
  }
  .back-btn{
    width:40px;height:40px;border-radius:12px;border:none;
    background:var(--surface);color:var(--text);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:all 0.18s ease;
    flex-shrink:0;
  }
  .back-btn:hover{background:var(--surface-hover)}
  .back-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}

  .chat-header .avatar{width:42px;height:42px;font-size:16px;border-radius:12px}
  .chat-header-info{flex:1;min-width:0}
  .chat-header-name{font-weight:600;font-size:16px;letter-spacing:-0.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-header-status{font-size:12px;color:var(--text-muted);margin-top:2px}

  .chat-messages-container{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
  .chat-messages{
    flex:1;padding:20px 16px 28px;
    overflow-y:auto;
    display:flex;flex-direction:column;
    scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent;
  }
  .chat-messages::-webkit-scrollbar{width:6px}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:10px}

  .message{
    max-width:78%;
    margin-bottom:6px;
    padding:9px 14px 10px;
    border-radius:18px;
    word-wrap:break-word;
    white-space:pre-wrap;
    animation:fadeIn 0.25s ease-out;
    line-height:1.42;
    font-size:14.5px;
    box-shadow:var(--shadow-md);
    position:relative;
  }
  @keyframes fadeIn{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .message + .message{margin-top:2px}
  .message.grouped-top{border-bottom-left-radius:6px;border-bottom-right-radius:6px}
  .message.grouped-middle{border-radius:6px 18px 18px 6px}
  .message.grouped-bottom{border-top-left-radius:6px}

  .message-you{
    background:var(--you-grad);
    color:#fff;
    align-self:flex-end;
    margin-right:2px;
    border-bottom-right-radius:6px;
  }
  .message-you.grouped-middle{border-radius:18px 6px 6px 18px}
  .message-you.grouped-bottom{border-top-right-radius:6px;border-bottom-right-radius:18px}
  .message-you.grouped-top{border-bottom-right-radius:6px}

  .message-other{
    background:#1a1f2c;
    border:1px solid var(--border);
    align-self:flex-start;
    margin-left:2px;
    border-bottom-left-radius:6px;
  }

  .message-sender{
    font-weight:600;
    margin-bottom:3px;
    font-size:12.5px;
    letter-spacing:-0.01em;
  }
  .message-other .message-sender{color:var(--accent-2)}
  .message-you .message-sender{display:none}

  .message-content{font-size:14.5px;line-height:1.45}
  .message-type{
    display:inline-flex;align-items:center;gap:5px;
    font-size:12px;font-weight:500;
    margin-top:6px;padding:3px 9px;border-radius:8px;
    background:rgba(255,255,255,0.08);
    color:rgba(255,255,255,0.75);
    letter-spacing:0.01em;
  }
  .message-you .message-type{background:rgba(255,255,255,0.18);color:rgba(255,255,255,0.9)}

  /* Разделитель даты/группы */
  .messages-end{height:12px;flex-shrink:0}

  /* Адаптивность */
  @media (max-width:480px){
    .header{padding:18px 18px 14px}
    .search-wrap{padding:12px 14px 6px}
    .chats-list{padding:4px 8px 100px}
    .chat-item{padding:10px 10px}
    .avatar{width:46px;height:46px;font-size:17px}
    .fab{bottom:20px;right:20px;width:54px;height:54px}
    .message{max-width:85%;font-size:14.5px}
    .chat-messages{padding:16px 12px 24px}
  }
</style>
</head>
<body>
<div class="app">

  <!-- Список чатов -->
  <div class="chats-page" id="chatsPage">
    <div class="header">
      <div class="brand">
        <div class="brand-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        </div>
        <div>
          <h1>Right Saver</h1>
          <div class="sub" id="brandSub">архив чатов</div>
        </div>
      </div>
      <button class="icon-btn" id="importBtnTop" title="Импорт">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </button>
    </div>

    <div class="search-wrap" id="searchWrap" style="display:none">
      <div class="search-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Поиск чатов">
      </div>
    </div>

    <input type="file" id="fileInput" class="file-input" accept=".txt">

    <div class="chats-list" id="chatsList">
      <div class="empty-state">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <h3>Чаты не загружены</h3>
        <p>Импортируйте текстовый файл с историей чатов, чтобы увидеть их здесь</p>
        <button class="primary-btn" id="importBtn">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Импортировать файл
        </button>
      </div>
    </div>

    <button class="fab" id="fab" style="display:none" title="Импорт нового файла">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- Страница чата -->
  <div class="chat-page" id="chatPage">
    <div class="chat-header">
      <button class="back-btn" id="backBtn">
        <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <div class="avatar" id="chatAvatar"></div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatTitle"></div>
        <div class="chat-header-status" id="chatStatus"></div>
      </div>
    </div>
    <div class="chat-messages-container">
      <div class="chat-messages" id="chatMessages"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const importBtnTop = document.getElementById('importBtnTop');
  const fileInput = document.getElementById('fileInput');
  const chatsList = document.getElementById('chatsList');
  const chatsPage = document.getElementById('chatsPage');
  const chatPage = document.getElementById('chatPage');
  const backBtn = document.getElementById('backBtn');
  const chatTitle = document.getElementById('chatTitle');
  const chatStatus = document.getElementById('chatStatus');
  const chatAvatar = document.getElementById('chatAvatar');
  const chatMessages = document.getElementById('chatMessages');
  const searchWrap = document.getElementById('searchWrap');
  const searchInput = document.getElementById('searchInput');
  const fab = document.getElementById('fab');
  const brandSub = document.getElementById('brandSub');

  let chatsData = {};
  let currentChat = null;
  let searchQuery = '';

  // Палитра градиентов для аватарок
  const avatarGradients = [
    'linear-gradient(135deg,#7c5cff,#5b8def)',
    'linear-gradient(135deg,#22d3ee,#3b82f6)',
    'linear-gradient(135deg,#f472b6,#a855f7)',
    'linear-gradient(135deg,#fb923c,#f43f5e)',
    'linear-gradient(135deg,#10b981,#14b8a6)',
    'linear-gradient(135deg,#fbbf24,#f59e0b)',
    'linear-gradient(135deg,#06b6d4,#0ea5e9)',
    'linear-gradient(135deg,#8b5cf6,#d946ef)',
    'linear-gradient(135deg,#ef4444,#f97316)',
    'linear-gradient(135deg,#84cc16,#22c55e)',
  ];
  function gradientFor(name){
    let h = 0;
    for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
    return avatarGradients[h % avatarGradients.length];
  }

  // Иконки для типов сообщений
  const typeIcons = {
    'Photo':'🖼','Image':'🖼','Video':'🎬','Voice':'🎙','Audio':'🎵',
    'Sticker':'🧷','Animation':'✨','Document':'📎','File':'📎',
    'VideoNote':'📹','Contact':'👤','Location':'📍','Poll':'📊'
  };
  function typeBadge(t){
    const ic = typeIcons[t] || '📄';
    return `${ic} ${t}`;
  }

  // ====== ИМПОРТ ======
  function triggerImport(){fileInput.click()}
  importBtnTop.addEventListener('click', triggerImport);
  fab.addEventListener('click', triggerImport);
  document.getElementById('importBtn').addEventListener('click', triggerImport);

  fileInput.addEventListener('change', function (e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (ev) {
      parseChatFile(ev.target.result);
      fileInput.value = '';
    };
    reader.readAsText(file);
  });

  backBtn.addEventListener('click', showChatsPage);

  searchInput.addEventListener('input', function(e){
    searchQuery = e.target.value.trim().toLowerCase();
    renderChatList();
  });

  // ====== ПАРСИНГ (логика сохранена) ======
  function parseChatFile(content) {
    chatsData = {};
    const lines = content.split('\n');
    let currentChatName = null;
    let currentChatId = null;
    let currentMessage = null;
    let needsUsernameExtraction = false;

    for (const line of lines) {
      if (line.trim() === '') continue;

      const chatHeaderMatch = line.match(/^\[Chat @([^\]]+)\]/);
      if (chatHeaderMatch) {
        if (currentChatName && currentMessage) {
          chatsData[currentChatName].push(currentMessage);
          currentMessage = null;
        }
        needsUsernameExtraction = false;
        currentChatName = chatHeaderMatch[1];
        currentChatId = null;
        if (!chatsData[currentChatName]) chatsData[currentChatName] = [];
        continue;
      }

      const chatIdHeaderMatch = line.match(/^\[Chat Chat ID: (\d+) \(Unknown Name\)\]/);
      if (chatIdHeaderMatch) {
        if (currentChatName && currentMessage) {
          chatsData[currentChatName].push(currentMessage);
          currentMessage = null;
        }
        currentChatId = chatIdHeaderMatch[1];
        currentChatName = `User${currentChatId}`;
        needsUsernameExtraction = true;
        if (!chatsData[currentChatName]) chatsData[currentChatName] = [];
        continue;
      }

      if (currentChatName) {
        const messageMatch = line.match(/^(\[You\]|\[@[^\]]+\]|\[[^\]]+\]): \[([^\]]+)\] ?(.*)/);
        if (messageMatch) {
          if (currentMessage) chatsData[currentChatName].push(currentMessage);
          const sender = messageMatch[1].replace(/^\[|\]$/g, '');
          const type = messageMatch[2];
          let text = messageMatch[3];

          if (needsUsernameExtraction && sender !== 'You') {
            let newChatName = sender.startsWith('@') ? sender.substring(1) : sender;
            const oldChatName = currentChatName;
            currentChatName = newChatName;
            if (chatsData[oldChatName]) {
              chatsData[currentChatName] = chatsData[oldChatName];
              delete chatsData[oldChatName];
            } else {
              chatsData[currentChatName] = [];
            }
            needsUsernameExtraction = false;
          }

          if (text.includes('🗑️ Новое удаление:')) {
            text = text.replace(/🗑️ Новое удаление:\s*(Удаленное сообщение:)?\s*([\s\S]*?)\s*Удалил сообщение: @[^\s]+/, '$2').trim();
            if (text === 'Без текста') text = '[сообщение без текста]';
          }

          currentMessage = {
            sender, type,
            text: text.replace(/\\n/g, '\n')
          };
        } else if (currentMessage) {
          currentMessage.text += '\n' + line.trim();
        }
      }
    }

    if (currentChatName && currentMessage) chatsData[currentChatName].push(currentMessage);
    renderChatList();
  }

  // ====== СПИСОК ЧАТОВ ======
  function renderChatList() {
    const allChatNames = Object.keys(chatsData);
    if (allChatNames.length === 0) {
      searchWrap.style.display = 'none';
      fab.style.display = 'none';
      brandSub.textContent = 'архив чатов';
      chatsList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <h3>Чаты не загружены</h3>
          <p>Импортируйте текстовый файл с историей чатов, чтобы увидеть их здесь</p>
          <button class="primary-btn" id="importBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Импортировать файл
          </button>
        </div>`;
      document.getElementById('importBtn').addEventListener('click', triggerImport);
      return;
    }

    searchWrap.style.display = '';
    fab.style.display = '';
    brandSub.textContent = `${allChatNames.length} ${pluralChats(allChatNames.length)}`;

    const filtered = searchQuery
      ? allChatNames.filter(n => n.toLowerCase().includes(searchQuery))
      : allChatNames;

    if (filtered.length === 0) {
      chatsList.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </div>
          <h3>Ничего не найдено</h3>
          <p>Попробуйте изменить запрос</p>
        </div>`;
      return;
    }

    chatsList.innerHTML = '';
    for (const chatName of filtered) {
      const chat = chatsData[chatName];
      const lastMessage = chat[chat.length - 1];

      const chatItem = document.createElement('div');
      chatItem.className = 'chat-item';

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.style.background = gradientFor(chatName);
      avatar.textContent = chatName.charAt(0).toUpperCase();

      const chatInfo = document.createElement('div');
      chatInfo.className = 'chat-info';

      const chatTop = document.createElement('div');
      chatTop.className = 'chat-top';

      const chatNameEl = document.createElement('div');
      chatNameEl.className = 'chat-name';
      chatNameEl.textContent = chatName.match(/^User\d+$/) ? chatName : `@${chatName}`;

      const countEl = document.createElement('div');
      countEl.className = 'chat-count';
      countEl.textContent = chat.length;

      chatTop.appendChild(chatNameEl);
      chatTop.appendChild(countEl);

      const chatPreview = document.createElement('div');
      chatPreview.className = 'chat-preview';

      if (lastMessage.type !== 'Text') {
        const tag = document.createElement('span');
        tag.className = 'chat-preview-tag';
        tag.textContent = typeBadge(lastMessage.type);
        chatPreview.appendChild(tag);
      } else {
        let previewText = lastMessage.text.replace(/\n/g, ' ');
        const prefix = lastMessage.sender === 'You' ? 'Вы: ' : '';
        if (previewText.length > 40) previewText = previewText.substring(0, 40) + '…';
        chatPreview.textContent = prefix + previewText;
      }

      chatInfo.appendChild(chatTop);
      chatInfo.appendChild(chatPreview);
      chatItem.appendChild(avatar);
      chatItem.appendChild(chatInfo);

      chatItem.addEventListener('click', function () {
        currentChat = chatName;
        showChatPage();
      });

      chatsList.appendChild(chatItem);
    }
  }

  function pluralChats(n){
    const mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return 'чат';
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'чата';
    return 'чатов';
  }

  function renderChatMessages() {
    if (!currentChat || !chatsData[currentChat]) {
      chatMessages.innerHTML = '';
      return;
    }
    const displayName = currentChat.match(/^User\d+$/) ? currentChat : `@${currentChat}`;
    chatTitle.textContent = displayName;
    chatAvatar.style.background = gradientFor(currentChat);
    chatAvatar.textContent = currentChat.charAt(0).toUpperCase();
    const messages = chatsData[currentChat];
    chatStatus.textContent = `${messages.length} ${pluralMsgs(messages.length)}`;

    chatMessages.innerHTML = '';
    for (let i = 0; i < messages.length; i++) {
      const message = messages[i];
      const prev = messages[i - 1];
      const next = messages[i + 1];
      const sameAsPrev = prev && prev.sender === message.sender;
      const sameAsNext = next && next.sender === message.sender;

      const messageEl = document.createElement('div');
      let cls = `message ${message.sender === 'You' ? 'message-you' : 'message-other'}`;
      if (sameAsPrev && sameAsNext) cls += ' grouped-middle';
      else if (sameAsPrev) cls += ' grouped-bottom';
      else if (sameAsNext) cls += ' grouped-top';
      messageEl.className = cls;

      if (message.sender !== 'You' && !sameAsPrev) {
        const senderEl = document.createElement('div');
        senderEl.className = 'message-sender';
        senderEl.textContent = `@${message.sender.replace('@', '')}`;
        messageEl.appendChild(senderEl);
      }

      const contentEl = document.createElement('div');
      contentEl.className = 'message-content';
      contentEl.textContent = message.text;
      messageEl.appendChild(contentEl);

      if (message.type !== 'Text') {
        const typeEl = document.createElement('div');
        typeEl.className = 'message-type';
        typeEl.textContent = typeBadge(message.type);
        messageEl.appendChild(typeEl);
      }

      chatMessages.appendChild(messageEl);
    }

    const endEl = document.createElement('div');
    endEl.className = 'messages-end';
    chatMessages.appendChild(endEl);

    setTimeout(() => { chatMessages.scrollTop = chatMessages.scrollHeight; }, 30);
  }

  function pluralMsgs(n){
    const mod10 = n % 10, mod100 = n % 100;
    if (mod10 === 1 && mod100 !== 11) return 'сообщение';
    if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return 'сообщения';
    return 'сообщений';
  }

  function showChatsPage() {
    chatsPage.style.display = 'flex';
    chatPage.style.display = 'none';
  }
  function showChatPage() {
    chatsPage.style.display = 'none';
    chatPage.style.display = 'flex';
    renderChatMessages();
  }
});
</script>
</body>
</html>
